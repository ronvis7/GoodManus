<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">

        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
          <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
          <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
          <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
          <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/></marker>
          <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/></marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)"/>

        <!-- ====== Docker Compose System Boundary ====== -->
        <rect x="40" y="45" width="1120" height="680" rx="12" fill="rgba(251, 191, 36, 0.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="52" y="63" fill="#fbbf24" font-size="10" font-weight="600">Docker Compose: manus-network</text>

        <!-- ====== Clean Architecture Boundary (Backend) ====== -->
        <rect x="420" y="100" width="480" height="360" rx="10" fill="rgba(52, 211, 153, 0.03)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="432" y="118" fill="#34d399" font-size="9" font-weight="600">Clean Architecture — FastAPI Backend (api/)</text>

        <!-- ====== External Components ====== -->
        <!-- Users -->
        <rect x="160" y="140" width="100" height="50" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="210" y="160" fill="white" font-size="11" font-weight="600" text-anchor="middle">Users</text>
        <text x="210" y="176" fill="#94a3b8" font-size="9" text-anchor="middle">Browser / API</text>

        <!-- DeepSeek LLM -->
        <rect x="920" y="140" width="120" height="50" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="980" y="160" fill="white" font-size="11" font-weight="600" text-anchor="middle">DeepSeek LLM</text>
        <text x="980" y="176" fill="#94a3b8" font-size="9" text-anchor="middle">v4-pro / 8192tk</text>

        <!-- MCP Servers -->
        <rect x="920" y="240" width="120" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="980" y="260" fill="white" font-size="11" font-weight="600" text-anchor="middle">MCP Servers</text>
        <text x="980" y="278" fill="#94a3b8" font-size="8" text-anchor="middle">Jina AI</text>
        <text x="980" y="293" fill="#94a3b8" font-size="8" text-anchor="middle">Amap Maps</text>
        <text x="980" y="310" fill="#fbbf24" font-size="7" text-anchor="middle">streamable HTTP</text>

        <!-- A2A Agents -->
        <rect x="920" y="370" width="120" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="980" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle">A2A Agents</text>
        <text x="980" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">Remote AI</text>
        <text x="980" y="422" fill="#fbbf24" font-size="7" text-anchor="middle">JSON-RPC 2.0</text>

        <!-- Tencent COS -->
        <rect x="920" y="480" width="120" height="50" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="980" y="500" fill="white" font-size="11" font-weight="600" text-anchor="middle">Tencent COS</text>
        <text x="980" y="516" fill="#94a3b8" font-size="9" text-anchor="middle">Object Storage</text>

        <!-- ====== Nginx Gateway ====== -->
        <rect x="160" y="270" width="100" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="210" y="292" fill="white" font-size="11" font-weight="600" text-anchor="middle">Nginx</text>
        <text x="210" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">Reverse Proxy</text>
        <text x="210" y="322" fill="#fb7185" font-size="7" text-anchor="middle">:8088 → :80</text>

        <!-- ====== Frontend ====== -->
        <rect x="160" y="420" width="200" height="80" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="260" y="445" fill="white" font-size="12" font-weight="600" text-anchor="middle">Next.js UI</text>
        <text x="260" y="465" fill="#94a3b8" font-size="9" text-anchor="middle">React + TypeScript</text>
        <text x="260" y="480" fill="#94a3b8" font-size="9" text-anchor="middle">Shadcn UI + Tailwind</text>
        <text x="260" y="494" fill="#22d3ee" font-size="7" text-anchor="middle">SSE / WebSocket Client</text>

        <!-- ====== Backend Clean Architecture Layers ====== -->
        <!-- Interfaces Layer -->
        <rect x="440" y="130" width="440" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="660" y="154" fill="white" font-size="11" font-weight="600" text-anchor="middle">Interfaces 接口层</text>
        <text x="660" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">Routes · Schemas (Pydantic) · Middleware (CORS) · Exception Handlers</text>
        <text x="660" y="184" fill="#22d3ee" font-size="7" text-anchor="middle">/api/sessions · /api/files · /api/app-config · /api/status</text>

        <!-- Application Layer -->
        <rect x="440" y="210" width="440" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="660" y="234" fill="white" font-size="11" font-weight="600" text-anchor="middle">Application 应用层</text>
        <text x="660" y="250" fill="#94a3b8" font-size="9" text-anchor="middle">AgentService · SessionService · FileService · StatusService</text>
        <text x="660" y="264" fill="#34d399" font-size="7" text-anchor="middle">Orchestration · Transaction Management · SSE Streaming</text>

        <!-- Domain Layer -->
        <rect x="440" y="290" width="440" height="80" rx="6" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
        <text x="660" y="314" fill="white" font-size="11" font-weight="600" text-anchor="middle">Domain 领域层</text>
        <text x="660" y="332" fill="#94a3b8" font-size="8" text-anchor="middle">Models: Session · Plan/Step · Event · Memory · Message</text>
        <text x="660" y="347" fill="#94a3b8" font-size="8" text-anchor="middle">Agents: PlannerAgent + ReActAgent · Flows: PlannerReActFlow</text>
        <text x="660" y="362" fill="#34d399" font-size="7" text-anchor="middle">Protocols: LLM · Sandbox · Browser · SearchEngine · JSONParser</text>

        <!-- Infrastructure Layer -->
        <rect x="440" y="390" width="440" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="660" y="414" fill="white" font-size="11" font-weight="600" text-anchor="middle">Infrastructure 基础设施层</text>
        <text x="660" y="430" fill="#94a3b8" font-size="9" text-anchor="middle">PostgreSQL · Redis · COS · OpenAI LLM · Playwright · Docker Sandbox · Bing Search</text>
        <text x="660" y="444" fill="#a78bfa" font-size="7" text-anchor="middle">Repository Implementations · Health Checkers · Logging</text>

        <!-- ====== Data Stores ====== -->
        <rect x="440" y="500" width="160" height="80" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="520" y="525" fill="white" font-size="11" font-weight="600" text-anchor="middle">PostgreSQL 16</text>
        <text x="520" y="543" fill="#94a3b8" font-size="8" text-anchor="middle">Sessions · Files</text>
        <text x="520" y="558" fill="#94a3b8" font-size="8" text-anchor="middle">Memories (JSONB)</text>
        <text x="520" y="573" fill="#a78bfa" font-size="7" text-anchor="middle">Alembic Migrations</text>

        <rect x="620" y="500" width="160" height="80" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="700" y="525" fill="white" font-size="11" font-weight="600" text-anchor="middle">Redis 7.2</text>
        <text x="700" y="543" fill="#94a3b8" font-size="8" text-anchor="middle">Task Queue</text>
        <text x="700" y="558" fill="#94a3b8" font-size="8" text-anchor="middle">Message Stream</text>
        <text x="700" y="573" fill="#a78bfa" font-size="7" text-anchor="middle">Cache + Pub/Sub</text>

        <!-- ====== Sandbox Service ====== -->
        <rect x="160" y="560" width="200" height="100" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="260" y="580" fill="white" font-size="11" font-weight="600" text-anchor="middle">Docker Sandbox</text>
        <text x="260" y="600" fill="#94a3b8" font-size="8" text-anchor="middle">Ubuntu 22.04 Container</text>
        <text x="260" y="615" fill="#94a3b8" font-size="8" text-anchor="middle">Chrome + Python 3.10</text>
        <text x="260" y="630" fill="#94a3b8" font-size="8" text-anchor="middle">Node.js 20 · VNC</text>
        <text x="260" y="648" fill="#fbbf24" font-size="7" text-anchor="middle">File + Shell + Supervisor API</text>

        <!-- ====== Agent Tools Bar ====== -->
        <rect x="30" y="80" width="120" height="16" rx="3" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="90" y="91" fill="#fb923c" font-size="8" font-weight="600" text-anchor="middle">Agent Tools</text>

        <rect x="440" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="475" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">File</text>
        <text x="475" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">read/write</text>

        <rect x="520" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="555" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">Shell</text>
        <text x="555" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">exec/pty</text>

        <rect x="600" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="635" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">Browser</text>
        <text x="635" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">Playwright</text>

        <rect x="680" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="715" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">Search</text>
        <text x="715" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">Bing API</text>

        <rect x="760" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="795" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">MCP</text>
        <text x="795" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">protocol</text>

        <rect x="840" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="875" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">A2A</text>
        <text x="875" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">agent2agent</text>

        <rect x="920" y="610" width="70" height="36" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="955" y="624" fill="white" font-size="8" font-weight="600" text-anchor="middle">Message</text>
        <text x="955" y="638" fill="#94a3b8" font-size="7" text-anchor="middle">ask_user</text>

        <!-- ====== Agent Flow (internal) ====== -->
        <rect x="160" y="690" width="400" height="30" rx="4" fill="rgba(52, 211, 153, 0.15)" stroke="#34d399" stroke-width="1"/>
        <text x="360" y="709" fill="#34d399" font-size="8" text-anchor="middle">Planner Agent: Create Plan → ReAct Agent: Execute Steps → Planner: Update Plan → ReAct: Summarize</text>

        <!-- ====== ARROWS ====== -->
        <!-- Users → Nginx -->
        <line x1="260" y1="165" x2="260" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Nginx → Frontend -->
        <line x1="260" y1="300" x2="260" y2="418" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
        <text x="275" y="365" fill="#94a3b8" font-size="8">SSR</text>

        <!-- Nginx → Backend (via proxy) -->
        <path d="M 260 300 Q 260 320 300 320 L 438 320" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
        <text x="340" y="314" fill="#94a3b8" font-size="8">/api/*</text>

        <!-- Frontend → Backend (SSE) -->
        <line x1="360" y1="460" x2="438" y2="460" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-emerald)"/>
        <text x="395" y="454" fill="#94a3b8" font-size="8">SSE</text>

        <!-- Clean Arch Layers (vertical) -->
        <line x1="660" y1="190" x2="660" y2="208" stroke="#34d399" stroke-width="1"/>
        <line x1="660" y1="270" x2="660" y2="288" stroke="#34d399" stroke-width="1"/>
        <line x1="660" y1="370" x2="660" y2="388" stroke="#34d399" stroke-width="1"/>

        <!-- Backend → PostgreSQL -->
        <line x1="520" y1="450" x2="520" y2="498" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
        <text x="535" y="478" fill="#94a3b8" font-size="7">asyncpg</text>

        <!-- Backend → Redis -->
        <line x1="700" y1="450" x2="700" y2="498" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
        <text x="715" y="478" fill="#94a3b8" font-size="7">aioredis</text>

        <!-- Backend → Sandbox -->
        <path d="M 440 420 Q 300 420 300 500 L 300 558" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="310" y="495" fill="#94a3b8" font-size="7">HTTP API</text>

        <!-- Backend → LLM (DeepSeek) -->
        <line x1="880" y1="340" x2="918" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="900" y="250" fill="#94a3b8" font-size="7">OpenAI</text>
        <text x="900" y="262" fill="#94a3b8" font-size="7">SDK</text>

        <!-- Backend → MCP -->
        <line x1="880" y1="280" x2="918" y2="280" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
        <text x="895" y="274" fill="#94a3b8" font-size="7">MCP</text>

        <!-- Backend → A2A -->
        <line x1="880" y1="400" x2="918" y2="400" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
        <text x="895" y="394" fill="#94a3b8" font-size="7">A2A</text>

        <!-- Backend → COS -->
        <line x1="880" y1="505" x2="918" y2="505" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Sandbox → Browser (internal) -->
        <text x="360" y="595" fill="#fbbf24" font-size="7">← Playwright CDP</text>

        <!-- ====== LEGEND ====== -->
        <text x="30" y="770" fill="white" font-size="10" font-weight="600">Legend</text>
        <rect x="30" y="782" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="52" y="790" fill="#94a3b8" font-size="8">Frontend / Interfaces</text>
        <rect x="200" y="782" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="222" y="790" fill="#94a3b8" font-size="8">Backend / Domain Services</text>
        <rect x="420" y="782" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
        <text x="442" y="790" fill="#94a3b8" font-size="8">Database / Infrastructure</text>
        <rect x="620" y="782" width="16" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
        <text x="642" y="790" fill="#94a3b8" font-size="8">Sandbox / Docker</text>
        <rect x="30" y="800" width="16" height="10" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
        <text x="52" y="808" fill="#94a3b8" font-size="8">Security / Gateway</text>
        <rect x="200" y="800" width="16" height="10" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="222" y="808" fill="#94a3b8" font-size="8">Agent Tools / Protocol</text>
        <rect x="420" y="800" width="16" height="10" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
        <text x="442" y="808" fill="#94a3b8" font-size="8">External Service / User</text>

        <!-- Boundaries -->
        <rect x="620" y="800" width="16" height="10" rx="2" fill="transparent" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="642" y="808" fill="#94a3b8" font-size="8">System Boundary</text>
        <rect x="760" y="800" width="16" height="10" rx="2" fill="transparent" stroke="#34d399" stroke-width="1" stroke-dasharray="2,2"/>
        <text x="782" y="808" fill="#94a3b8" font-size="8">Architecture Layer</text>
      
</svg>